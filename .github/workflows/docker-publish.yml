name: Publish Docker Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: tatertotterson/nanowakeword-trainer

jobs:
  nvidia:
    name: NVIDIA image
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push NVIDIA image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.nvidia
          platforms: linux/amd64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:nvidia
          cache-from: type=gha,scope=nanowakeword-trainer-nvidia
          cache-to: type=gha,mode=max,scope=nanowakeword-trainer-nvidia
